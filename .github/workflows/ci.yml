name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -t remotecache:ci .

      - name: Start Docker container
        run: docker run -d --name remotecache-ci -e ADMIN_TOKEN=ci-smoke-admin-token-0123456789 -p 3000:3000 remotecache:ci

      - name: Wait for server
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /tmp/remotecache-health.txt; then
              cat /tmp/remotecache-health.txt
              exit 0
            fi
            sleep 1
          done

          docker logs remotecache-ci
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker rm -f remotecache-ci || true

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3

      - name: Helm lint
        run: helm lint charts/remotecache --set adminToken=ci-admin-token-0123456789

      - name: Helm template (filesystem)
        run: helm template rc charts/remotecache -f charts/remotecache/ci/filesystem-values.yaml

      - name: Helm template (s3)
        run: helm template rc charts/remotecache -f charts/remotecache/ci/s3-values.yaml

      - name: Helm template (tls)
        run: helm template rc charts/remotecache -f charts/remotecache/ci/tls-values.yaml

      - name: Helm template (extras)
        run: helm template rc charts/remotecache -f charts/remotecache/ci/extras-values.yaml

      - name: Install kubeconform
        run: curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz | tar xz kubeconform

      - name: Validate manifests with kubeconform
        run: |
          for values in charts/remotecache/ci/*.yaml; do
            echo "--- $values"
            helm template rc charts/remotecache -f "$values" \
              | ./kubeconform -strict -summary -ignore-missing-schemas
          done

  helm-install:
    runs-on: ubuntu-latest
    needs: helm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build -t remotecache:kind-ci .

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Load image into kind
        run: kind load docker-image remotecache:kind-ci --name chart-testing

      - name: Install chart
        run: |
          helm install rc charts/remotecache \
            --set adminToken=ci-admin-token-0123456789 \
            --set image.repository=remotecache \
            --set image.tag=kind-ci \
            --set image.pullPolicy=Never \
            --wait --timeout 180s

      - name: Run chart test hook
        run: helm test rc --logs

      - name: Diagnose failure
        if: failure()
        run: |
          kubectl get pods,pvc -o wide
          kubectl describe pods
          kubectl logs -l app.kubernetes.io/instance=rc --tail=100 || true

  s3-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in sync with @types/bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/live; then exit 0; fi
            sleep 1
          done
          docker logs minio
          exit 1

      - name: Create bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: aws --endpoint-url http://127.0.0.1:9000 --region us-east-1 s3 mb s3://remotecache-e2e

      - name: Run S3 e2e
        env:
          S3_E2E_ENDPOINT: http://127.0.0.1:9000
        run: bun test e2e/s3-minio.e2e.spec.ts

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio || true

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-fs.sarif
