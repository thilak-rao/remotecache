name: Publish Image

on:
  push:
    branches: ['main']
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/remotecache
  CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/remotecache:buildcache

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read

  image-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build local Docker image
        run: docker build -t remotecache:publish-check .

      - name: Start Docker container
        run: docker run -d --name remotecache-publish-check -e ADMIN_TOKEN=ci-smoke-admin-token-0123456789 -p 3000:3000 remotecache:publish-check

      - name: Wait for server
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /tmp/remotecache-health.txt; then
              cat /tmp/remotecache-health.txt
              exit 0
            fi
            sleep 1
          done

          docker logs remotecache-publish-check
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker rm -f remotecache-publish-check || true

      - name: Scan local Docker image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: remotecache:publish-check
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload Trivy image SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-image.sarif

  publish:
    runs-on: ubuntu-latest
    needs: [checks, image-check]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max
          provenance: mode=max
          sbom: true

  publish-helm:
    runs-on: ubuntu-latest
    needs: [checks, image-check]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        id: push
        env:
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/remotecache --version "$VERSION" --app-version "$VERSION"
          echo "$GH_TOKEN" | helm registry login ghcr.io -u "$ACTOR" --password-stdin
          helm push "remotecache-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts" 2>&1 | tee push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]+' push.log | head -1)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/${OWNER}/charts/remotecache" >> "$GITHUB_OUTPUT"

      - name: Attest chart provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.push.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-binaries:
    runs-on: ubuntu-latest
    needs: [checks, image-check]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in sync with @types/bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: bash scripts/build-binaries.sh "${GITHUB_REF_NAME#v}"

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Refresh checksums with SBOM
        run: cd dist && sha256sum remotecache-* sbom.spdx.json > checksums.txt

      - name: Upload binaries artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: dist/
          if-no-files-found: error

  smoke-binaries:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
          - os: macos-15-intel
            suffix: darwin-x64
          - os: macos-15
            suffix: darwin-arm64
          - os: windows-latest
            suffix: windows-x64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: dist

      - name: Smoke test binary
        shell: bash
        run: |
          BIN="dist/remotecache-${GITHUB_REF_NAME#v}-${{ matrix.suffix }}${{ matrix.ext }}"
          chmod +x "$BIN"
          ADMIN_TOKEN=smoke-admin-token-0123456789 "$BIN" &
          SERVER_PID=$!
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              echo " <- health OK"
              kill "$SERVER_PID" || true
              exit 0
            fi
            sleep 1
          done
          echo "binary failed health check"
          kill "$SERVER_PID" || true
          exit 1

  publish-binaries:
    runs-on: ubuntu-latest
    needs: [build-binaries, smoke-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job: gh only resolves the repo from GH_REPO
          # (it ignores GITHUB_REPOSITORY outside a git directory).
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PRERELEASE=""
          case "$VERSION" in *-*) PRERELEASE="--prerelease" ;; esac
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE
          fi
          gh release upload "$TAG" dist/remotecache-* dist/sbom.spdx.json dist/checksums.txt --clobber

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/remotecache-*'
