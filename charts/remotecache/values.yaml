# Default values for remotecache.

replicaCount: 1

# Rolling updates deadlock with ReadWriteOnce PVCs: the replacement pod can't
# attach a volume the old pod still holds. Recreate is the safe default; only
# switch to RollingUpdate when no RWO PVC is mounted (e.g. S3 storage with
# persistence.data disabled).
deploymentStrategy:
  type: Recreate

image:
  repository: ghcr.io/thilak-rao/remotecache
  # When empty, the tag defaults to the chart appVersion: the release version on
  # a published chart, or `edge` on a source checkout. Set explicitly to pin one.
  tag: ''
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

# Admin token (required). Provide exactly one of:
#   adminToken: a literal value -> the chart creates a Secret
#   existingSecret (+ existingSecretKey) -> reference an existing Secret
adminToken: ''
existingSecret: ''
existingSecretKey: admin-token

config:
  port: 3000
  # bindAddress: "0.0.0.0" (default) or "::" for IPv6 / dual-stack pods.
  bindAddress: '0.0.0.0'
  maxUploadBytes: 524288000
  verbose: false
  # Opt-in filesystem cache eviction (filesystem strategy only). Leave unset
  # for today's behavior: no eviction.
  # cacheMaxBytes: 10737418240 # evict least-recently-used entries over this total
  # cacheTtlHours: 720 # evict entries not accessed within this window
  # sweepIntervalMs: 60000 # sweep period; only runs when a policy above is set

storage:
  # "filesystem" (default) or "s3".
  strategy: filesystem
  tokensDbPath: /app/data/nx-cache-server-tokens.sqlite
  filesystem:
    cacheDir: /app/cache

s3:
  bucket: ''
  region: ''
  endpoint: ''
  # Static credentials (optional). Leave empty to use the ServiceAccount's IAM
  # role (IRSA), an ECS task role, or an instance profile via the AWS chain.
  # Use these inline values or existingSecret, not both.
  accessKeyId: ''
  secretAccessKey: ''
  sessionToken: ''
  # An existing Secret with keys: access-key-id, secret-access-key, [session-token].
  # Use this or inline static credentials, not both.
  existingSecret: ''

# Direct TLS (optional). Prefer ingress / reverse-proxy TLS for most setups.
tls:
  enabled: false
  # A kubernetes.io/tls Secret providing tls.crt and tls.key.
  existingSecret: ''
  mountPath: /etc/remotecache/tls

persistence:
  data:
    enabled: true
    size: 1Gi
    storageClass: ''
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  cache:
    # Used only by the filesystem strategy.
    enabled: true
    size: 10Gi
    storageClass: ''
    accessModes:
      - ReadWriteOnce
    existingClaim: ''

serviceAccount:
  create: true
  name: ''
  # For IRSA, set: eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role>
  annotations: {}

service:
  type: ClusterIP
  port: 3000

metrics:
  serviceMonitor:
    # Requires the Prometheus Operator CRDs (e.g. kube-prometheus-stack).
    enabled: false
    interval: 30s
    additionalLabels: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

ingress:
  enabled: false
  className: ''
  # For large cache artifacts behind ingress-nginx, raise the body-size cap:
  #   nginx.ingress.kubernetes.io/proxy-body-size: '0'
  annotations: {}
  # hosts:
  #   - host: cache.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  hosts: []
  # tls:
  #   - secretName: cache-example-tls
  #     hosts: [cache.example.com]
  tls: []

livenessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10

# Escape hatches.
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
nodeSelector: {}
tolerations: []
affinity: {}
