apiVersion: v1
kind: Pod
metadata:
  name: {{ include "remotecache.fullname" . }}-test-connection
  labels:
    {{- include "remotecache.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    # No hook-succeeded: it deletes the pod before `helm test --logs` can read
    # its output on the success path (helm/helm#9098). before-hook-creation
    # still clears the previous run's pod on the next `helm test`.
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: busybox:1.37
      command:
        - wget
        - '-q'
        - '-O-'
        {{- if .Values.tls.enabled }}
        - '--no-check-certificate'
        {{- end }}
        - '{{ if .Values.tls.enabled }}https{{ else }}http{{ end }}://{{ include "remotecache.fullname" . }}:{{ .Values.service.port }}/health'
