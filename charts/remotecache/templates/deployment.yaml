{{- if and (not .Values.adminToken) (not .Values.existingSecret) }}
{{- fail "remotecache: set either .Values.adminToken or .Values.existingSecret" }}
{{- end }}
{{- if and .Values.adminToken .Values.existingSecret }}
{{- fail "remotecache: set only one of .Values.adminToken or .Values.existingSecret" }}
{{- end }}
{{- if and .Values.adminToken (lt (len (toString .Values.adminToken)) 16) }}
{{- fail "remotecache: adminToken must be at least 16 characters" }}
{{- end }}
{{- if not (or (eq .Values.storage.strategy "filesystem") (eq .Values.storage.strategy "s3") (eq .Values.storage.strategy "gcs")) }}
{{- fail "remotecache: storage.strategy must be filesystem, s3, or gcs" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "s3") (not .Values.s3.bucket) }}
{{- fail "remotecache: storage.strategy=s3 requires s3.bucket" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "s3") .Values.s3.existingSecret (or .Values.s3.accessKeyId .Values.s3.secretAccessKey .Values.s3.sessionToken) }}
{{- fail "remotecache: set only one of s3.existingSecret or inline S3 credentials" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "s3") (not .Values.s3.existingSecret) (ne (not .Values.s3.accessKeyId) (not .Values.s3.secretAccessKey)) }}
{{- fail "remotecache: s3.accessKeyId and s3.secretAccessKey must be set together, or both omitted for ambient credentials" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "s3") (not .Values.s3.existingSecret) .Values.s3.sessionToken (not (and .Values.s3.accessKeyId .Values.s3.secretAccessKey)) }}
{{- fail "remotecache: s3.sessionToken requires s3.accessKeyId and s3.secretAccessKey" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "gcs") (not .Values.gcs.bucket) }}
{{- fail "remotecache: storage.strategy=gcs requires gcs.bucket" }}
{{- end }}
{{- if and (eq .Values.storage.strategy "gcs") .Values.gcs.existingSecret .Values.gcs.keyFilename }}
{{- fail "remotecache: set only one of gcs.existingSecret or gcs.keyFilename" }}
{{- end }}
{{- if and .Values.tls.enabled (not .Values.tls.existingSecret) }}
{{- fail "remotecache: tls.enabled requires tls.existingSecret (a kubernetes.io/tls Secret)" }}
{{- end }}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "remotecache: replicaCount > 1 is not supported: the SQLite token store and data PVC are single-writer. Track multi-replica support in the project roadmap." }}
{{- end }}
{{- if and (ne .Values.storage.strategy "filesystem") (or .Values.config.cacheMaxBytes .Values.config.cacheTtlHours .Values.config.sweepIntervalMs) }}
{{- fail "remotecache: config.cacheMaxBytes/cacheTtlHours/sweepIntervalMs require storage.strategy=filesystem (use object storage lifecycle rules instead)" }}
{{- end }}
{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) }}
{{- fail "remotecache: ingress.enabled requires at least one entry in ingress.hosts" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remotecache.fullname" . }}
  labels:
    {{- include "remotecache.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "remotecache.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "remotecache.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "remotecache.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "remotecache.adminSecretName" . }}
                  key: {{ include "remotecache.adminSecretKey" . }}
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: BIND_ADDRESS
              value: {{ .Values.config.bindAddress | quote }}
            - name: MAX_UPLOAD_BYTES
              value: {{ .Values.config.maxUploadBytes | int64 | quote }}
            - name: TOKENS_DB_PATH
              value: {{ .Values.storage.tokensDbPath | quote }}
            - name: STORAGE_STRATEGY
              value: {{ .Values.storage.strategy | quote }}
            {{- if .Values.config.verbose }}
            - name: VERBOSE
              value: "1"
            {{- end }}
            {{- if eq .Values.storage.strategy "filesystem" }}
            - name: CACHE_DIR
              value: {{ .Values.storage.filesystem.cacheDir | quote }}
            {{- with .Values.config.cacheMaxBytes }}
            - name: CACHE_MAX_BYTES
              value: {{ . | int64 | quote }}
            {{- end }}
            {{- with .Values.config.cacheTtlHours }}
            - name: CACHE_TTL_HOURS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.sweepIntervalMs }}
            - name: CACHE_SWEEP_INTERVAL_MS
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.storage.strategy "s3" }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            {{- if .Values.s3.region }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            {{- end }}
            {{- if .Values.s3.endpoint }}
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            {{- end }}
            {{- if or .Values.s3.existingSecret (and .Values.s3.accessKeyId .Values.s3.secretAccessKey) }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "remotecache.s3SecretName" . }}
                  key: access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "remotecache.s3SecretName" . }}
                  key: secret-access-key
            - name: S3_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "remotecache.s3SecretName" . }}
                  key: session-token
                  optional: true
            {{- end }}
            {{- end }}
            {{- if eq .Values.storage.strategy "gcs" }}
            - name: GCS_BUCKET
              value: {{ .Values.gcs.bucket | quote }}
            {{- if .Values.gcs.projectId }}
            - name: GCS_PROJECT_ID
              value: {{ .Values.gcs.projectId | quote }}
            {{- end }}
            {{- if .Values.gcs.keyFilename }}
            - name: GCS_KEY_FILENAME
              value: {{ .Values.gcs.keyFilename | quote }}
            {{- end }}
            {{- if .Values.gcs.existingSecret }}
            - name: GCS_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gcs.existingSecret }}
                  key: {{ .Values.gcs.existingSecretKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: TLS_CERT_PATH
              value: {{ printf "%s/tls.crt" .Values.tls.mountPath | quote }}
            - name: TLS_KEY_PATH
              value: {{ printf "%s/tls.key" .Values.tls.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Bun and SQLite need a writable /tmp once the root FS is read-only.
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: {{ dir .Values.storage.tokensDbPath }}
            {{- if eq .Values.storage.strategy "filesystem" }}
            - name: cache
              mountPath: {{ .Values.storage.filesystem.cacheDir }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default (printf "%s-data" (include "remotecache.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if eq .Values.storage.strategy "filesystem" }}
        - name: cache
          {{- if .Values.persistence.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.cache.existingClaim | default (printf "%s-cache" (include "remotecache.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
